[mypy]
warn_unused_configs = True
check_untyped_defs = True
explicit_package_bases = True
warn_unreachable = True
warn_redundant_casts = True
no_implicit_optional = True
strict_optional = True


[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-memory_profiler.*]
ignore_missing_imports = True

[mypy-browsergym.*]
ignore_missing_imports = True

[mypy-socketio.*]
ignore_missing_imports = True

[mypy-binaryornot.*]
ignore_missing_imports = True

[mypy-networkx.*]
ignore_missing_imports = True

[mypy-nest_asyncio.*]
ignore_missing_imports = True

[mypy-frontmatter.*]
ignore_missing_imports = True

[mypy-bashlex.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.jaeger.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.zipkin.*]
ignore_missing_imports = True

[mypy-forge.*]
ignore_missing_imports = True

# Internal modules not present in this branch
[mypy-backend.server.session.manager]
ignore_missing_imports = True

[mypy-backend.telemetry.telemetry_logger]
ignore_missing_imports = True

[mypy-backend.llm.model_response]
ignore_missing_imports = True

[mypy-backend.runtime.tools]
ignore_missing_imports = True

[mypy-backend.controller.state.context]
ignore_missing_imports = True

[mypy-backend.core.config.main_config]
ignore_missing_imports = True

# Condenser overrides are intentional (Liskov override for specific config types)
[mypy-backend.memory.condenser.impl.*]
disable_error_code = override
