[mypy]
warn_unused_configs = True
check_untyped_defs = True
explicit_package_bases = True
warn_unreachable = True
warn_redundant_casts = True
no_implicit_optional = True
strict_optional = True
plugins = pydantic.mypy


[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-memory_profiler.*]
ignore_missing_imports = True

[mypy-socketio.*]
ignore_missing_imports = True

[mypy-binaryornot.*]
ignore_missing_imports = True

[mypy-networkx.*]
ignore_missing_imports = True

[mypy-nest_asyncio.*]
ignore_missing_imports = True

[mypy-frontmatter.*]
ignore_missing_imports = True

[mypy-bashlex.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.jaeger.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.zipkin.*]
ignore_missing_imports = True

[mypy-forge.*]
ignore_missing_imports = True

[mypy-toml.*]
ignore_missing_imports = True

[mypy-backend.runtime.browser.*]
ignore_missing_imports = True

# Condenser overrides are intentional (Liskov override for specific config types)
[mypy-backend.memory.condenser.impl.*]
disable_error_code = override
