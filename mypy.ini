[mypy-pptx.*]
ignore_missing_imports = True

[mypy-chromadb.*]
ignore_missing_imports = True

[mypy-backend.execution.utils.windows_bash]
warn_unreachable = False

# CLI is display-layer code with known Textual/Rich version mismatches.
[mypy-backend.cli.*]
disable_error_code = override, attr-defined, arg-type, union-attr, name-defined, list-item, return-value, no-redef, func-returns-value, has-type, unreachable, var-annotated, assignment, index, return

# Tests heavily use mocks, SimpleNamespace, and dynamic patterns.
[mypy-backend.tests.*]
disable_error_code = arg-type, attr-defined, assignment, index, method-assign, union-attr, unreachable, list-item

# Third-party packages without stubs
[mypy-openai.*]
ignore_missing_imports = True

[mypy-mcp.*]
ignore_missing_imports = True

[mypy-pydantic.*]
