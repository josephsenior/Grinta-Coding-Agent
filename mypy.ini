[mypy]
warn_unused_configs = True
check_untyped_defs = True
explicit_package_bases = True
warn_unreachable = True
warn_redundant_casts = True
no_implicit_optional = True
strict_optional = True
plugins = pydantic.mypy
files = backend, launch, scripts


[mypy-psutil.*]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-frontmatter.*]
ignore_missing_imports = True

[mypy-bashlex.*]
ignore_missing_imports = True

[mypy-ptyprocess.*]
ignore_missing_imports = True

[mypy-winpty.*]
ignore_missing_imports = True

# Entire module after ``raise`` is non-importable on non-win32; suppress noise on Linux CI.
[mypy-huggingface_hub.*]
ignore_missing_imports = True

[mypy-flashrank.*]
ignore_missing_imports = True

[mypy-PyPDF2.*]
ignore_missing_imports = True

[mypy-docx.*]
ignore_missing_imports = True

[mypy-chromadb.*]
ignore_missing_imports = True

[mypy-backend.execution.utils.windows_bash]
warn_unreachable = False

[mypy-pyperclip.*]
ignore_missing_imports = True

# CLI display layer: Textual/Rich type stubs lag behind runtime APIs.
[mypy-backend.cli.*]
disable_error_code = override, attr-defined, arg-type, union-attr, name-defined, has-type, assignment, unreachable, misc, var-annotated, func-returns-value, return-value, list-item

# Ratchet: newly extracted modules type-check without the broad CLI relaxations.
[mypy-backend.cli.doctor.checks]
disable_error_code = attr-defined, union-attr

[mypy-backend.cli.onboarding.flow]
disable_error_code = attr-defined

[mypy-backend.cli.settings.mode_runtime]
disable_error_code = attr-defined, union-attr

[mypy-backend.inference.local_model]
disable_error_code = attr-defined

[mypy-backend.tests.unit.cli.*]
disable_error_code = name-defined, has-type, dict-item, misc, attr-defined, assignment, arg-type, unreachable

[mypy-backend.utils.*]
disable_error_code = unreachable

[mypy-backend.core.logging.session_event_logger]
disable_error_code = unreachable

[mypy-backend.execution.dap._dap_logging]
disable_error_code = unreachable

[mypy-scripts.evals.*]
disable_error_code = import-not-found

[mypy-backend.orchestration.*]
disable_error_code = unreachable, attr-defined, has-type, misc, assignment, arg-type, union-attr, name-defined, import-not-found, no-redef

[mypy-backend.core.bootstrap.*]
disable_error_code = attr-defined

[mypy-backend.execution.io_mixins.*]
disable_error_code = attr-defined, arg-type, union-attr

[mypy-backend.execution.utils.*]
disable_error_code = attr-defined

[mypy-backend.engine.executor_mixins.*]
disable_error_code = attr-defined

[mypy-backend.context.*]
disable_error_code = unreachable, assignment, union-attr

[mypy-backend.ledger.*]
disable_error_code = arg-type, return-value, misc, has-type

[mypy-backend.execution.*]
disable_error_code = misc, import-untyped, attr-defined

[mypy-backend.engine.memory_manager]
disable_error_code = unreachable, assignment, arg-type, union-attr

[mypy-backend.inference.*]
disable_error_code = attr-defined, return-value, union-attr, assignment

[mypy-scripts.*]
disable_error_code = arg-type

[mypy-backend.app.*]
disable_error_code = attr-defined

[mypy-backend.context.context_pipeline.*]
disable_error_code = empty-body

[mypy-backend.execution.utils.shell.windows_bash]
disable_error_code = unreachable

[mypy-opentelemetry.sdk.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.otlp.proto.http.trace_exporter.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.otlp.proto.grpc.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.jaeger.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.zipkin.*]
ignore_missing_imports = True

# Tests heavily use mocks, SimpleNamespace, and dynamic patterns.
[mypy-backend.tests.*]
disable_error_code = arg-type, attr-defined, assignment, index, method-assign, union-attr, unreachable, list-item, no-redef, operator, misc, abstract

# Third-party packages without stubs
[mypy-openai.*]
ignore_missing_imports = True

[mypy-mcp.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-pathspec.*]
