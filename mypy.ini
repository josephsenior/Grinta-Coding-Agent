[mypy]
warn_unused_configs = True
check_untyped_defs = True
explicit_package_bases = True
warn_unreachable = True
warn_redundant_casts = True
no_implicit_optional = True
strict_optional = True
plugins = pydantic.mypy
files = backend, launch, scripts


[mypy-sentry_sdk.*]
ignore_missing_imports = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-motor.*]
ignore_missing_imports = True

[mypy-pypdf.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.otlp.proto.http.trace_exporter.*]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-memory_profiler.*]
ignore_missing_imports = True

[mypy-socketio.*]
ignore_missing_imports = True

[mypy-binaryornot.*]
ignore_missing_imports = True

[mypy-networkx.*]
ignore_missing_imports = True

[mypy-nest_asyncio.*]
ignore_missing_imports = True

[mypy-frontmatter.*]
ignore_missing_imports = True

[mypy-bashlex.*]
ignore_missing_imports = True

[mypy-browser_use.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.jaeger.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.zipkin.*]
ignore_missing_imports = True

[mypy-ptyprocess.*]
ignore_missing_imports = True

[mypy-winpty.*]
ignore_missing_imports = True

# Entire module after ``raise`` is non-importable on non-win32; suppress noise on Linux CI.
[mypy-backend.execution.utils.windows_bash]
warn_unreachable = False
