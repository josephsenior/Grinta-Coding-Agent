# Entire module after ``raise`` is non-importable on non-win32; suppress noise on Linux CI.
[mypy-huggingface_hub.*]
ignore_missing_imports = True

[mypy-opentelemetry.sdk.*]
ignore_missing_imports = True

[mypy-opentelemetry.exporter.otlp.proto.grpc.*]
