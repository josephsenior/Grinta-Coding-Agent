repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(docs/|modules/|python/)
      - id: end-of-file-fixer
        exclude: ^(docs/|modules/|python/)
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.5.1
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.5
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.0
    hooks:
      - id: mypy
        additional_dependencies:
          [
            types-requests,
            types-setuptools,
            types-pyyaml,
            types-toml,
            types-docker,
            types-Markdown,
            pydantic,
            lxml,
          ]
        args: [--ignore-missing-imports, --no-strict-optional]
        exclude: ^(tests/|backend/tests/)

  - repo: local
    hooks:
      - id: check-layer-imports
        name: Check layer boundary imports
        entry: python backend/scripts/verify/check_layer_imports.py
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$

  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: python -c "import os, subprocess, sys; os.environ['PYTHONIOENCODING'] = 'utf-8'; sys.exit(subprocess.run([sys.executable, '-m', 'bandit', '-c', 'pyproject.toml', '-r', '--skip', 'B101,B102,B103,B104,B105,B106,B107,B108,B110,B112,B301,B306,B310,B311,B403,B404,B603,B604,B607,B608', '-q', 'backend'], check=False).returncode)"
        language: system
        pass_filenames: false
        always_run: true
        exclude: ^(tests/|backend/tests/)

  # - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
