repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(docs/|modules/|python/)
      - id: end-of-file-fixer
        exclude: ^(docs/|modules/|python/)
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.5.1
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --config-file mypy.ini
        language: system
        pass_filenames: false
        files: ^(backend|launch|scripts)/.*\.py$

  - repo: local
    hooks:
      - id: check-layer-imports
        name: Check layer boundary imports
        entry: python backend/scripts/verify/check_layer_imports.py
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$

  - repo: local
    hooks:
      - id: check-cli-file-size
        name: Check CLI file size budget (advisory)
        entry: python backend/scripts/verify/check_file_size.py --changed-only
        language: system
        pass_filenames: false
        files: ^backend/cli/.*\.py$
        verbose: true

  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: uv run python -c "import os, subprocess, sys; os.environ['PYTHONIOENCODING'] = 'utf-8'; sys.exit(subprocess.run([sys.executable, '-m', 'bandit', '-c', 'pyproject.toml', '-r', '-q', 'backend'], check=False).returncode)"
        language: system
        pass_filenames: false
        always_run: true
        exclude: ^(tests/|backend/tests/)

