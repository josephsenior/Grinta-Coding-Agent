- name: "area: mcp"
  color: "1d76db"
  description: "Model Context Protocol integration."

- name: "area: safety"
  color: "1d76db"
  description: "Risk classification, audit log, hardened_local profile."

- name: "area: telemetry"
  color: "1d76db"
