- name: "area: engine"
  color: "1d76db"
  description: "Planner / function calling / prompt assembly."

- name: "area: execution"
  color: "1d76db"
  description: "Runtime, terminal, command execution, file editing."

- name: "area: lsp"
  color: "1d76db"
  description: "Language server / `lsp` tool."

- name: "area: dap"
  color: "1d76db"
