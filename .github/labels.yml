# ---------------------------------------------------------------------------
# Severity / risk
# ---------------------------------------------------------------------------
- name: "severity: critical"
  color: "b60205"
  description: "Data loss, security, or unrecoverable state."

- name: "severity: high"
  color: "d93f0b"
  description: "Blocks normal use of a major capability."

- name: "severity: medium"
  color: "e99695"
  description: "Workaround exists but UX is degraded."

- name: "severity: low"
  color: "fef2c0"
  description: "Cosmetic or rare-edge issue."

- name: security
  color: "b60205"
  description: "Security-sensitive issue. See SECURITY.md before commenting."

# ---------------------------------------------------------------------------
# Release / governance
# ---------------------------------------------------------------------------
- name: breaking-change
  color: "b60205"
  description: "Backwards-incompatible change."

- name: dependencies
  color: "0366d6"
  description: "Pull request that updates a dependency."

- name: ci
  color: "5319e7"
  description: "Changes to CI workflows, checks, or automation."

- name: refactor
  color: "c2e0c6"
  description: "Internal code restructuring without behavior change."

- name: chore
  color: "fef2c0"
  description: "Maintenance work that is not a feature or fix."

- name: performance
  color: "fbca04"
  description: "Performance improvements."

- name: feature
  color: "a2eeef"
  description: "Net-new user-facing capability."

- name: fix
  color: "d73a4a"
  description: "Bug fix."

- name: docs
  color: "0075ca"
  description: "Documentation changes."

- name: major
  color: "b60205"
  description: "Release bump: major version."

- name: minor
  color: "fbca04"
  description: "Release bump: minor version."

- name: patch
  color: "0e8a16"
  description: "Release bump: patch version."

