name: Dependency Audit (pip-audit)

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          enable-cache: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python scripts/bootstrap_env.py dev-test
      - name: Run pip-audit
        run: >
          uv run pip-audit
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln PYSEC-2026-2253
          --ignore-vuln PYSEC-2026-2254
          --ignore-vuln PYSEC-2026-2255
          --ignore-vuln PYSEC-2026-2256
          --ignore-vuln PYSEC-2026-2257
          --ignore-vuln PYSEC-2026-3451
          --ignore-vuln PYSEC-2026-3452
          --ignore-vuln PYSEC-2026-3453
