name: Dependency Audit (pip-audit)

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python scripts/bootstrap_env.py dev-test
      - name: Run pip-audit
        run: >
          uv run pip-audit
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln PYSEC-2026-2253
          --ignore-vuln PYSEC-2026-2254
          --ignore-vuln PYSEC-2026-2255
          --ignore-vuln PYSEC-2026-2256
          --ignore-vuln PYSEC-2026-2257
          --ignore-vuln PYSEC-2026-3451
          --ignore-vuln PYSEC-2026-3452
          --ignore-vuln PYSEC-2026-3453
