# Workflow that runs python tests
name: Run Python Tests

# The jobs in this workflow are required, so they must run at all times
# * Always run on "main"
# * Always run on PRs
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

# If triggered by a PR, it will be in the same group. However, each commit on main will be in its own unique group
concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

# CI tiers (see docs/CI.md):
# - gates-on-linux / gates-on-windows: full backend/tests/unit (fast PR gates; narrower than pytest.ini testpaths).
# - heavy-tests: pytest markers heavy | integration | benchmark (schedule, main, manual).
jobs:
  gates-on-linux:
    name: Python Gates on Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Lockfile validation
        run: uv lock --check
      - name: Install Python dependencies
        run: uv sync --group dev --group test --group runtime
      - name: Verify optional imports
        run: python backend/scripts/verify/verify_optional_imports.py
      - name: Compile backend (syntax gate)
        run: uv run python -m compileall backend
      - name: Run unit tests (full corpus)
        run: PYTHONPATH=".:$PYTHONPATH" uv run pytest -q backend/tests/unit

      - name: Run coverage for Codecov
        if: always()
        run: PYTHONPATH=".:$PYTHONPATH" uv run pytest --maxfail=1 -q --cov=backend --cov-fail-under=0 --cov-report=xml:coverage.xml backend/tests/unit

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          use_oidc: true
          files: ./coverage.xml
          flags: python-linux
          name: python-linux
          fail_ci_if_error: true
          verbose: true

  gates-on-windows:
    name: Python Gates on Windows
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Lockfile validation
        run: uv lock --check
      - name: Install Python dependencies
        run: uv sync --group dev --group test --group runtime
      - name: Verify optional imports
        run: python backend/scripts/verify/verify_optional_imports.py
      - name: Compile backend (syntax gate)
        run: uv run python -m compileall backend
      - name: Run unit tests (full corpus)
        run: uv run pytest -q backend/tests/unit
        env:
          PYTHONPATH: ".;$env:PYTHONPATH"

      - name: Run coverage for Codecov
        if: always()
        shell: pwsh
        run: uv run pytest --maxfail=1 -q --cov=backend --cov-fail-under=0 --cov-report=xml:coverage.xml backend/tests/unit
        env:
          PYTHONPATH: ".;$env:PYTHONPATH"

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          use_oidc: true
          files: ./coverage.xml
          flags: python-windows
          name: python-windows
          fail_ci_if_error: true
          verbose: true

  heavy-tests:
    name: Heavy / Integration Tests
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python dependencies
        run: uv sync --group dev --group test --group runtime
      - name: Lockfile validation
        run: uv lock --check
      - name: Verify optional imports
        run: python backend/scripts/verify/verify_optional_imports.py
      - name: Compile backend (syntax gate)
        run: uv run python -m compileall backend
      - name: Run heavy / integration tests
        run: PYTHONPATH=".:$PYTHONPATH" uv run pytest backend/tests -m "heavy or integration or benchmark" -vv

  gates-on-macos:
    name: Python Gates on macOS
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Lockfile validation
        run: uv lock --check
      - name: Install Python dependencies
        run: uv sync --group dev --group test --group runtime
      - name: Verify optional imports
        run: python backend/scripts/verify/verify_optional_imports.py
      - name: Compile backend (syntax gate)
        run: uv run python -m compileall backend
      - name: Run unit tests (full corpus)
        run: PYTHONPATH=".:$PYTHONPATH" uv run pytest -q backend/tests/unit
