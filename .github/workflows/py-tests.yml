# Workflow that runs python tests
name: Run Python Tests

# The jobs in this workflow are required, so they must run at all times
# * Always run on "main"
# * Always run on PRs
on:
  push:
    branches:
      - main
  pull_request:

# If triggered by a PR, it will be in the same group. However, each commit on main will be in its own unique group
concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  gates-on-linux:
    name: Python Gates on Linux
    runs-on: blacksmith-4vcpu-ubuntu-2204
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        uses: useblacksmith/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Lockfile validation
        run: uv lock --check
      - name: Install Python dependencies
        run: uv sync --group dev --group test --group runtime
      - name: Verify optional imports
        run: python backend/scripts/verify/verify_optional_imports.py
      - name: Compile backend (syntax gate)
        run: uv run python -m compileall backend
      - name: Run minimal pytest slice
        run: PYTHONPATH=".:$PYTHONPATH" uv run pytest -q \
          backend/tests/test_metrics_labels.py \
          backend/tests/test_request_metrics.py \
          backend/tests/integration/test_trajectory_replay.py

  gates-on-windows:
    name: Python Gates on Windows
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Lockfile validation
        run: uv lock --check
      - name: Install Python dependencies
        run: uv sync --group dev --group test --group runtime
      - name: Verify optional imports
        run: python backend/scripts/verify/verify_optional_imports.py
      - name: Compile backend (syntax gate)
        run: uv run python -m compileall backend
      - name: Run minimal pytest slice
        run: uv run pytest -q backend/tests/test_metrics_labels.py backend/tests/test_request_metrics.py backend/tests/integration/test_trajectory_replay.py
        env:
          PYTHONPATH: ".;$env:PYTHONPATH"

  heavy-tests:
    name: Heavy / Integration Tests
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        uses: useblacksmith/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python dependencies
        run: uv sync --group dev --group test --group runtime
      - name: Lockfile validation
        run: uv lock --check
      - name: Verify optional imports
        run: python backend/scripts/verify/verify_optional_imports.py
      - name: Compile backend (syntax gate)
        run: uv run python -m compileall backend
      - name: Run heavy / integration tests
        run: PYTHONPATH=".:$PYTHONPATH" uv run pytest -m "heavy or integration or benchmark" -vv
