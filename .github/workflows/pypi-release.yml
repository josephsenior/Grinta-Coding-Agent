# Publishes the Grinta PyPI package
name: Publish PyPi Package

# Triggered manually
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: true
        default: ''

jobs:
  # Gate: run tests before publishing
  pre-release-tests:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: useblacksmith/setup-python@v6
        with:
          python-version: 3.12
      - name: Install dependencies
        run: uv sync --group dev --group test
      - name: Run type checks
        run: uv run mypy --config-file mypy.ini
      - name: Run unit tests
        run: uv run pytest backend/tests/unit -q

  release:
    needs: pre-release-tests
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: useblacksmith/setup-python@v6
        with:
          python-version: 3.12
      - name: Install dependencies
        run: uv sync
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}
