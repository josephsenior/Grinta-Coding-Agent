# Publishes the Grinta PyPI package
name: Publish PyPi Package

# Triggered manually
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: true
        default: ''

jobs:
  # Gate: run tests before publishing
  pre-release-tests:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: useblacksmith/setup-python@v6
        with:
          python-version: 3.12
      - name: Install dependencies
        run: uv sync --group dev --group test
      - name: Run type checks
        run: uv run mypy --config-file mypy.ini
      - name: Run unit tests
        run: uv run pytest backend/tests/unit -q

  release:
    needs: pre-release-tests
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: useblacksmith/setup-python@v6
        with:
          python-version: 3.12
      - name: Install dependencies
        run: uv sync
      - name: Build package
        run: uv build
      - name: Smoke test built wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          grinta --help
          grinta --version
          mkdir -p .package-smoke-workspace
          export APP_ROOT="$PWD/.package-smoke-app"
          mkdir -p "$APP_ROOT"
          cat > "$APP_ROOT/settings.json" <<'JSON'
          {
            "llm_provider": "openai",
            "llm_model": "openai/gpt-4.1",
            "llm_api_key": "${LLM_API_KEY}",
            "llm_base_url": ""
          }
          JSON
          printf '/help\n' | env \
            APP_ROOT="$APP_ROOT" \
            LLM_API_KEY=sk-test-release-smoke \
            LLM_MODEL=openai/gpt-4.1 \
            GRINTA_NO_SPLASH=1 \
            LOG_TO_FILE=false \
            grinta --project .package-smoke-workspace --no-splash
      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}
