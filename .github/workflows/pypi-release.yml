# Publishes the Grinta PyPI package
name: Publish PyPi Package

# Triggered manually
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: true
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  # Gate: run tests before publishing
  pre-release-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: 3.12
      - name: Install dependencies
        run: python scripts/bootstrap_env.py dev-test
      - name: Run type checks
        run: uv run mypy --config-file mypy.ini
      - name: Run unit tests
        run: uv run pytest backend/tests/unit -q

  release:
    needs: pre-release-tests
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: 3.12
      - name: Install dependencies
        run: python scripts/bootstrap_env.py base
      - name: Build package
        run: uv build
      - name: Smoke test built wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          grinta --help
          grinta --version
          mkdir -p .package-smoke-workspace
          export APP_ROOT="$PWD/.package-smoke-app"
          mkdir -p "$APP_ROOT"
          cat > "$APP_ROOT/settings.json" <<'JSON'
          {
            "llm_provider": "openai",
            "llm_model": "openai/gpt-4.1",
            "llm_api_key": "${LLM_API_KEY}",
            "llm_base_url": ""
          }
          JSON
          printf '/help\n' | env \
            APP_ROOT="$APP_ROOT" \
            LLM_API_KEY=sk-test-release-smoke \
            LLM_MODEL=openai/gpt-4.1 \
            GRINTA_NO_SPLASH=1 \
            LOG_TO_FILE=false \
            grinta --project .package-smoke-workspace --no-splash
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
