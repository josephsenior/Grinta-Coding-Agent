# Workflow that runs Bandit security static analysis on the python code
name: Security Scan (Bandit)

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f
        with:
          enable-cache: true
      - name: Set up python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: 3.12
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run Bandit
        run: uv run bandit -c pyproject.toml -r backend --exclude backend/tests -ll
