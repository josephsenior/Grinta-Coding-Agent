# Workflow that runs Bandit security static analysis on the python code
name: Security Scan (Bandit)

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          enable-cache: true
      - name: Set up python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.12
      - name: Install dependencies
        run: python scripts/bootstrap_env.py dev
      - name: Run Bandit
        run: uv run bandit -c pyproject.toml -r backend --exclude backend/tests -ll -f json -o bandit-report.json || true
      - name: Check Bandit report
        run: |
          if [ -f bandit-report.json ]; then
            SEVERITY=$(python -c "import json; data=json.load(open('bandit-report.json')); print(sum(1 for r in data['results'] if r['issue_severity'] in ('HIGH','MEDIUM')))")
            if [ "$SEVERITY" -gt 0 ]; then
              echo "Found $SEVERITY medium/high severity issues"
              python -c "import json; data=json.load(open('bandit-report.json')); [print(f'{r[\"filename\"]}:{r[\"line_number\"]} [{r[\"issue_severity\"]}] {r[\"issue_text\"]}') for r in data['results'] if r['issue_severity'] in ('HIGH','MEDIUM')]"
              exit 1
            fi
          fi
        shell: bash
