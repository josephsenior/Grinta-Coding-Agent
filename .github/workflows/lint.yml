# Workflow that runs lint on the python code
name: Lint

# The jobs in this workflow are required, so they must run at all times
# Always run on "main"
# Always run on PRs
on:
  push:
    branches:
      - main
  pull_request:

# If triggered by a PR, it will be in the same group. However, each commit on main will be in its own unique group
concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  # Run lint on the python code
  lint-python:
    name: Lint python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          enable-cache: true
      - name: Set up python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: 3.12
          cache: 'pip'
      - name: Install Python dependencies
        run: python scripts/bootstrap_env.py dev
      - name: Install pre-commit
        run: pip install pre-commit==4.6
      - id: run-pre-commit-hooks
        run: pre-commit run --all-files --show-diff-on-failure

  # Check version consistency across documentation
  check-version-consistency:
    name: Check version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Set up python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: 3.12
      - name: Run version consistency check
        run: python .github/scripts/check_version_consistency.py

  check-workflow-config-consistency:
    name: Check workflow config consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Set up python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: 3.12
      - name: Run workflow config consistency check
        run: python .github/scripts/check_workflow_config_consistency.py

  # Run mypy type checks on the backend
  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          enable-cache: true
      - name: Set up python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: 3.12
      - name: Install dependencies
        run: python scripts/bootstrap_env.py dev
      - name: Run mypy
        run: uv run mypy --config-file mypy.ini

  # Repo hygiene: ensure no cache artifacts are tracked
  repo-hygiene:
    name: Repo hygiene (no cache artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Fail if cache directories are tracked
        run: |
          if git ls-files | grep -E '(\.mypy_cache|\.ruff_cache|\.pytest_cache|\.hypothesis)' ; then
            echo "::error::Cache directories (.mypy_cache, .ruff_cache, .pytest_cache, .hypothesis) are tracked in git. Remove them and verify .gitignore."
            exit 1
          fi
          echo "No cache artifacts are tracked in the repository."
      - name: Check tracked repository payload
        run: python .github/scripts/check_repository_hygiene.py
