name: CLI Regression Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/e2e-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  cli-regressions:
    name: CLI Regression (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']

    env:
      PYTHONPATH: '.'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --group test --group runtime

      - name: Compile backend (syntax gate)
        run: uv run python -m compileall backend

      - name: Run CLI startup integration smoke
        run: >
          uv run pytest
          -m integration
          backend/tests/integration/test_cli_entry_integration.py
          backend/tests/integration/test_cli_task_e2e.py
          -q --tb=short

      - name: Run CLI unit regression slice
        run: >
          uv run pytest
          backend/tests/unit/cli/test_cli_frontend.py
          backend/tests/unit/orchestration/test_session_orchestrator.py
          backend/tests/unit/orchestration/services/test_action_execution_service.py
          -k "wait_for_agent_idle or step_from_threadpool_uses_main_loop or parallel_batch_failure_requeues_failed_actions_for_serial_retry or preserves_recovery_round_after_real_action or recovers_first_round_then_pauses"
          -q --tb=short
