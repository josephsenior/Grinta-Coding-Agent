name: End-to-End Tests

# NOTE: These tests were written for the old React frontend (Playwright browser automation).
# The frontend has been replaced by a Textual TUI. These tests need to be rewritten
# to test against the backend API directly. Disabled until then.

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    # Disabled — Playwright-based tests require the removed React frontend.
    # TODO: Rewrite e2e tests to validate via backend API / TUI integration.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GITHUB_REPO_NAME: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install poetry via pipx
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: 2.1.3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd
          poetry install --with dev,test,runtime

      - name: Start backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'gpt-4o' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || 'test-key' }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          BACKEND_HOST: 0.0.0.0
          BACKEND_PORT: 3000
        run: |
          poetry run uvicorn backend.api.listen:app \
            --host $BACKEND_HOST --port $BACKEND_PORT &
          until nc -z localhost $BACKEND_PORT; do sleep 0.5; done
          echo "Backend started on port $BACKEND_PORT"

      - name: Run end-to-end tests
        env:
          GITHUB_TOKEN: ${{ secrets.E2E_TEST_GITHUB_TOKEN }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'gpt-4o' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || 'test-key' }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        run: |
          echo "TODO: Add API-based e2e tests"

      - name: Cleanup
        if: always()
        run: |
          pkill -f "uvicorn backend.api" || true
