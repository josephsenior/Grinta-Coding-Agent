name: End-to-End Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/e2e-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  agent-loop-e2e:
    name: Agent Loop E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']

    env:
      FORGE_TEST_AGENT_TIMEOUT: '120'
      PYTHONPATH: '.'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --group test --group runtime

      - name: Compile backend (syntax gate)
        run: uv run python -m compileall backend

      - name: Start backend (Linux)
        if: runner.os != 'Windows'
        env:
          FORGE_HOST: '127.0.0.1'
          PORT: '3000'
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          uv run uvicorn backend.api.socketio_asgi_app:app \
            --host 127.0.0.1 --port 3000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/api/health/live && break || sleep 1
          done
          echo "Backend started"

      - name: Start backend (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          FORGE_HOST: '127.0.0.1'
          PORT: '3000'
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          Start-Process -NoNewWindow -FilePath "uv" `
            -ArgumentList "run","uvicorn","backend.api.socketio_asgi_app:app","--host","127.0.0.1","--port","3000"
          for ($i = 0; $i -lt 30; $i++) {
            try {
              Invoke-WebRequest -Uri http://127.0.0.1:3000/api/health/live -UseBasicParsing -TimeoutSec 2 | Out-Null
              Write-Output "Backend started"
              break
            } catch { Start-Sleep -Seconds 1 }
          }

      - name: Run agent loop E2E tests
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: uv run pytest backend/tests/e2e/test_agent_loop_e2e.py -m integration -v --timeout=180

      - name: Cleanup (Linux)
        if: always() && runner.os != 'Windows'
        run: pkill -f "uvicorn backend.api" || true

      - name: Cleanup (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: Stop-Process -Name python -Force -ErrorAction SilentlyContinue
