# Workflow that validates the VSCode extension builds correctly
name: VSCode Extension CI

# * Always run on "main"
# * Run on PRs that have changes in the VSCode extension folder or this workflow
# * Run on tags that start with "ext-v"
on:
  push:
    branches:
      - main
    tags:
      - 'ext-v*'
  pull_request:
    paths:
      - 'app/integrations/vscode/**'
      - 'build_vscode.py'
      - '.github/workflows/vscode-extension-build.yml'

# If triggered by a PR, it will be in the same group. However, each commit on main will be in its own unique group
concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-vscode-assets:
    name: Detect VSCode extension assets
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.detect.outputs.available }}
      missing: ${{ steps.detect.outputs.missing }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect required files
        id: detect
        shell: bash
        run: |
          required=(
            "build_vscode.py"
            "app/integrations/vscode/package.json"
          )

          missing=()
          for path in "${required[@]}"; do
            if [ ! -e "$path" ]; then
              missing+=("$path")
            fi
          done

          if [ ${#missing[@]} -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "VSCode extension assets detected."
          else
            joined=$(printf "%s, " "${missing[@]}")
            joined=${joined%, }
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "missing=$joined" >> "$GITHUB_OUTPUT"
            echo "Missing VSCode extension assets: $joined"
          fi

  vscode-assets-missing:
    name: VSCode workflow skipped (assets missing)
    runs-on: ubuntu-latest
    needs: detect-vscode-assets
    if: needs.detect-vscode-assets.outputs.available != 'true'
    steps:
      - name: Explain skip
        run: |
          echo "Skipping VSCode extension build because required assets are missing."
          echo "Missing: ${{ needs.detect-vscode-assets.outputs.missing }}"

  # Validate VSCode extension builds correctly
  validate-vscode-extension:
    name: Validate VSCode Extension Build
    needs: detect-vscode-assets
    if: needs.detect-vscode-assets.outputs.available == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2204

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install VSCode extension dependencies
        working-directory: ./app/integrations/vscode
        run: npm ci

      - name: Build VSCode extension via build_vscode.py
        run: python build_vscode.py
        env:
          # Ensure we don't skip the build
          SKIP_VSCODE_BUILD: ""

      - name: Discover built .vsix file
        id: discover_vsix
        shell: bash
        run: |
          shopt -s nullglob
          files=(app/integrations/vscode/*.vsix)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .vsix file found under app/integrations/vscode"
            exit 1
          fi

          vsix_path="${files[0]}"
          vsix_file=$(basename "$vsix_path")
          echo "vsix_path=$vsix_path" >> "$GITHUB_OUTPUT"
          echo "vsix_file=$vsix_file" >> "$GITHUB_OUTPUT"

      - name: Validate .vsix file
        run: |
          # Verify the .vsix was created and is valid
          if [ -f "${{ steps.discover_vsix.outputs.vsix_path }}" ]; then
            echo "✅ VSCode extension built successfully"
            ls -la "${{ steps.discover_vsix.outputs.vsix_path }}"

            # Basic validation that the .vsix is a valid zip file
            echo "🔍 Validating .vsix structure..."
            file "${{ steps.discover_vsix.outputs.vsix_path }}"
            unzip -t "${{ steps.discover_vsix.outputs.vsix_path }}"

            echo "✅ VSCode extension validation passed"
          else
            echo "❌ VSCode extension build failed - .vsix not found"
            exit 1
          fi

      - name: Upload VSCode extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: ${{ steps.discover_vsix.outputs.vsix_path }}
          retention-days: 7

      - name: Comment on PR with artifact link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Get file size for display
            const vsixPath = '${{ steps.discover_vsix.outputs.vsix_path }}';
            const vsixFile = '${{ steps.discover_vsix.outputs.vsix_file }}';
            const stats = fs.statSync(vsixPath);
            const fileSizeKB = Math.round(stats.size / 1024);

            const comment = `## 🔧 VSCode Extension Built Successfully!

            The VSCode extension has been built and is ready for testing.

            **📦 Download**: [${vsixFile}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) (${fileSizeKB} KB)

            **🚀 To install**:
            1. Download the artifact from the workflow run above
            2. In VSCode: \`Ctrl+Shift+P\` → "Extensions: Install from VSIX..."
            3. Select the downloaded \`.vsix\` file

            **✅ Tested with**: Node.js 22
            **🔍 Validation**: File structure and integrity verified

            ---
            *Built from commit ${{ github.sha }}*`;

            // Check if we already commented on this PR and delete it
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('VSCode Extension Built Successfully')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            // Create a new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  release:
    name: Create GitHub Release
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: [validate-vscode-extension, detect-vscode-assets]
    if: startsWith(github.ref, 'refs/tags/ext-v') && needs.detect-vscode-assets.outputs.available == 'true'

    steps:
      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: ./

      - name: Create Release
        uses: ncipollo/release-action@v1.16.0
        with:
          artifacts: "*.vsix"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          allowUpdates: true
