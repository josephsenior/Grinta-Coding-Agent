[pytest]
addopts = -q --maxfail=5 --import-mode=importlib -p no:cacheprovider -p no:playwright

# Ignore heavy or system-dependent test directories by default
# evaluation: evaluation benchmarks (vllm etc.)
# e2e/runtime: end-to-end and runtime tests requiring Docker/tmux/powershell
python_files = test_*.py *_test.py

# Ensure project root is importable when using importlib mode.
pythonpath = .

# Match main pytest configuration to avoid event loop conflicts.
asyncio_mode = auto

markers =
	ui: UI/browser tests requiring a running app/server

norecursedirs =
	.git
	.venv
	venv
	node_modules
	dist
	build
	backend/tests/e2e
	backend/tests/runtime
	backend/tests/stress
