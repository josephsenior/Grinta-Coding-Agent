[build-system]
build-backend = "poetry.core.masonry.api"
requires = [
  "poetry-core",
]

[project]
name = "forge-ai"
version = "0.55.0"
description = "Forge: Your AI-Powered Development Platform"
readme = "README.md"
license = "MIT"
authors = [ { name = "Forge Team" } ]
requires-python = ">=3.12,<3.14"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
  "aiohttp>=3.9,!=3.11.13",
  "anthropic>=0.40,<1",
  "anyio>=4.9,<5",
  "asyncpg>=0.30,<0.31",
  "bashlex>=0.18,<0.19",
  "diff-match-patch>=20241021,<20260000",
  "fastapi>=0.115,<1",
  "fastmcp>=2.13,<3",
  "google-generativeai>=0.8,<1",
  "html2text>=2025.4.15,<2026",
  "httpx>=0.27,<1",
  "jinja2>=3.1.3,<4",
  "json-repair>=0.48,<1",
  "libtmux>=0.37,<0.40",
  "mcp>=1.10,<2",
  "openai>=1.40,<3",
  "pillow>=11.3,<12",
  "psutil>=7,<8",
  "python-dotenv>=1.1.1,<2",
  "python-frontmatter>=1.1,<2",
  "python-json-logger>=3.2.1,<4",
  "python-multipart>=0.0.20,<1",
  "python-socketio>=5.14,<6",
  "rapidfuzz>=3.9,<4",
  "requests>=2.32.4,<3",
  "sse-starlette>=2.1.3,<3",
  "starlette>=0.49.1,<0.50",
  "tenacity>=8.5,<10",
  "termcolor>=3.1,<4",
  "tree-sitter>=0.24,<0.25",
  "tree-sitter-language-pack>=0.7.3,<0.8",
  "uvicorn>=0.30,<1",
  "whatthepatch>=1.0.6,<2",
  "textual (>=3.0,<4)",
  "chromadb>=1.4,<2",
  "qdrant-client>=1.16.2,<2",
  "sentence-transformers>=5.2,<6",
  "redis>=5.2,<7",
  "python-docx>=1.1,<2",
  "PyPDF2>=3.0,<4",
  "python-pptx>=1.0,<2",
  "pylatexenc>=2.10,<3",
  "opencv-python>=4.11,<5",
  "puremagic (>=1.30,<2.0)",
  "binaryornot (>=0.4.4,<0.5.0)",
  "memory-profiler (>=0.61.0,<0.62.0)",
]

optional-dependencies.all = [
  "docker>=7.1,<8",
  "opentelemetry-api>=1.33.1,<2",
  "opentelemetry-exporter-otlp-proto-grpc>=1.33.1,<2",
  "protobuf>=5,<6",
]
optional-dependencies.browser = [
  "numpy>=2.3.2,<3",
]
optional-dependencies.caching = []

optional-dependencies.containers = [
  "docker>=7.1,<8",
]
optional-dependencies.telemetry = [
  "opentelemetry-api>=1.33.1,<2",
  "opentelemetry-exporter-otlp-proto-grpc>=1.33.1,<2",
  "protobuf>=5,<6",
]
urls = { Repository = "https://github.com/Forge/Forge" }
scripts.forge = "backend.interface.entry:main"
scripts.Forge = "backend.interface.entry:main"
scripts.forge-tui = "backend.tui.__main__:main"

[tool.poetry]
packages = [
  { include = "backend" },
]
include = [
  "backend/playbooks/**/*",
]

[tool.poetry.group.dev]
optional = true

[tool.poetry.group.dev.dependencies]
ruff = "0.12.5"
mypy = "1.17.0"
pre-commit = "4.2.0"
build = "^1.2.2"
types-setuptools = "^80.9.0.20250529"
pytest = "^8.4.0"
flake8 = ">=7.3.0,<8.0.0"
grpcio = "^1.70.0"
grpcio-tools = "^1.70.0"
bandit = "^1.9.3"

[tool.poetry.group.test]
optional = true

[tool.poetry.group.test.dependencies]
pytest = "^8.4.0"
pytest-cov = ">=4.1.0,<7.0.0"
pytest-asyncio = ">=0.21.1,<1.0.0"
pytest-forked = ">=1.6.0,<2.0.0"
pytest-xdist = ">=3.8.0,<4.0.0"
pytest-playwright = "^0.7.0"
pytest-timeout = "^2.4.0"
pandas = ">=2.3.1,<3.0.0"
reportlab = ">=4.4.3,<5.0.0"
gevent = ">=24.2.1,<26.0.0"

[tool.poetry.group.runtime]
optional = true

[tool.poetry.group.runtime.dependencies]
# Runtime dependencies
pyarrow = "21.0.0" # Transitive dependency, pinned here to avoid conflicts

[tool.poetry-dynamic-versioning]
enable = true
style = "semver"

[tool.autopep8]
# autopep8 fights with mypy on line length issue
ignore = [ "E501" ]

[tool.black]
# prevent black (if installed) from changing single quotes to double quotes
skip-string-normalization = true


format.quote-style = "single"
lint.select = [
  "ASYNC",
  "B",
  "D",
  "E",
  "F",
  "I",
  "Q",
  "UP006", # Use `list` instead of `List` for annotations
  "UP007", # Use `X | Y` instead of `Union[X, Y]`
  "UP008", # Use `X | None` instead of `Optional[X]`
  "W",
]
lint.ignore = [
  # Temporarily ignore ASYNC rules until they can be properly fixed in a separate PR
  "ASYNC110",
  "ASYNC220",
  "ASYNC221",
  "ASYNC230",
  "ASYNC251",
  "B003",
  "B007",
  "B009",
  "B010",
  "B018",
  "B904",
  "D1",       # Ignore warnings for missing docstrings
  "E501",
]
lint.flake8-bugbear.extend-immutable-calls = [ "Depends", "fastapi.Depends", "fastapi.params.Depends" ]
lint.flake8-quotes.docstring-quotes = "double"
lint.flake8-quotes.inline-quotes = "single"
lint.pydocstyle.convention = "google"

[tool.coverage.run]
source = [
  "backend",
]
omit = [
  "*/tests/*",
  "*/test_*.py",
  "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "def __repr__",
  "raise AssertionError",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
  "@abstractmethod",
]
precision = 2
show_missing = true
skip_covered = false
fail_under = 95

[tool.bandit]
# Security scanning configuration
# B101: assert used — acceptable in tests and internal assertions
# B110: try/except/pass — used intentionally for graceful degradation
# B404: import subprocess — needed for runtime command execution
# B603: subprocess call — controlled by SecurityAnalyzer
# B607: partial path — acceptable for tool invocations
skips = ["B101", "B110", "B404", "B603", "B607"]
exclude_dirs = ["backend/tests", "tests"]
