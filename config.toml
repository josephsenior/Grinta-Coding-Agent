###################### Forge Configuration Example ######################
#
# All settings have default values, so you only need to uncomment and
# modify what you want to change
# The fields within each section are sorted in alphabetical order.
#
##############################################################################

################################ Security ####################################
# Authentication and authorization settings (OSS Mode)
##############################################################################
[security]
# Unique key for session management (replaces password login)
# If not set, the server will log a warning and use a default 'dev' key
# Provide this key in the 'X-Session-API-Key' header
# IMPORTANT: Change this key before deploying to any shared/public environment.
# If left empty or removed, the server will auto-generate a secure random key
# and persist it to .env.local on first startup.
# session_api_key = ""

#################################### Core ####################################
# General core configurations
##############################################################################
[core]
# API keys and configuration for core services

# Cache directory path
#cache_dir = "/tmp/cache"

# Debugging enabled
#debug = false

# Disable color in terminal output
#disable_color = false

# Path to store trajectories, can be a folder or a file
# If it's a folder, the session id will be used as the file name
#save_trajectory_path="./trajectories"

# Whether to save screenshots in the trajectory
# The screenshots are encoded and can make trajectory json files very large
#save_screenshots_in_trajectory = false

# Path to replay a trajectory, must be a file path
# If provided, trajectory will be loaded and replayed before the
# agent responds to any user instruction
#replay_trajectory_path = ""

# File store path
#file_store_path = "/tmp/file_store"

# File store type
#file_store = "memory"

# Maximum file size for uploads, in megabytes
#file_uploads_max_file_size_mb = 0

# Enable the browser environment
#enable_browser = true

# Maximum LLM cost (USD) per task. Default $5.00 prevents runaway costs.
# Set to 0 for no limit (not recommended for unattended sessions).
max_budget_per_task = 5.0

# Maximum LLM cost (USD) per session (single conversation).
# When set, this cap is shown live in the TUI status bar.
# Overrides max_budget_per_task for per-session enforcement.
# Example: max_budget_per_session = 2.0
#max_budget_per_session = 0.0

# Maximum total LLM cost (USD) across ALL sessions in a single calendar day.
# When set, the TUI status bar shows today's running total vs this limit.
# Example: max_budget_per_day = 20.0
#max_budget_per_day = 0.0

# Maximum number of iterations
#max_iterations = 500

# Run as Forge
#run_as_Forge = true

# Runtime environment
#runtime = "local"

# Name of the default agent
default_agent = "Orchestrator"

# JWT secret for authentication
#jwt_secret = ""

# Restrict file types for file uploads
#file_uploads_restrict_file_types = false

# List of allowed file extensions for uploads
#file_uploads_allowed_extensions = [".*"]

# Whether to enable the default LLM summarizing condenser when no condenser is specified in config
# When true, a LLMSummarizingCondenserConfig will be used as the default condenser
# When false, a NoOpCondenserConfig (no summarization) will be used
#enable_default_condenser = true

# Maximum number of concurrent conversations per user
#max_concurrent_conversations = 3

# Maximum age of conversations in seconds before they are automatically closed
#conversation_max_age_seconds = 864000  # 10 days

#################################### LLM #####################################
# Configuration for LLM models (group name starts with 'llm')
# use 'llm' for the default LLM config
##############################################################################
[llm]
# AWS access key ID
#aws_access_key_id = ""

# AWS region name
#aws_region_name = ""

# AWS secret access key
#aws_secret_access_key = ""

# API key to use (For Headless / CLI only -  In Web this is overridden by Session Init)
api_key = ""

# API base URL (For Headless / CLI only -  In Web this is overridden by Session Init)
#base_url = ""

# API version
#api_version = ""

# Reasoning effort for OpenAI o-series models (low, medium, high, or not set)
#reasoning_effort = "medium"

# Cost per input token
#input_cost_per_token = 0.0

# Cost per output token
#output_cost_per_token = 0.0

# Custom LLM provider
#custom_llm_provider = ""

# Maximum number of characters in an observation's content
#max_message_chars = 10000

# Maximum number of input tokens
#max_input_tokens = 0

# Maximum number of output tokens
#max_output_tokens = 0

# Model to use. (For Headless / CLI only -  In Web this is overridden by Session Init)
model = "claude-sonnet-4-20250514"

# Number of retries to attempt when an operation fails with the LLM.
# Increase this value to allow more attempts before giving up
#num_retries = 8

# Maximum wait time (in seconds) between retry attempts
# This caps the exponential backoff to prevent excessively long
#retry_max_wait = 120

# Minimum wait time (in seconds) between retry attempts
# This sets the initial delay before the first retry
#retry_min_wait = 15

# Multiplier for exponential backoff calculation
# The wait time increases by this factor after each failed attempt
# A value of 2.0 means each retry waits twice as long as the previous one
#retry_multiplier = 2.0

# Drop any unmapped (unsupported) params without causing an exception
#drop_params = false

# Modify params to do transformations like adding a default message, when a message is empty.
# Note: this setting is global, unlike drop_params, it cannot be overridden in each call.
#modify_params = true

# Using the prompt caching feature if provided by the LLM and supported
#caching_prompt = true

# Base URL for the OLLAMA API
#ollama_base_url = ""

# Temperature for the API
#temperature = 0.0

# Timeout for the API
#timeout = 0

# Top p for the API
#top_p = 1.0

# If model is vision capable, this option allows to disable image processing (useful for cost reduction).
#disable_vision = true

# Custom tokenizer to use for token counting
#custom_tokenizer = ""

# Whether to use native tool calling if supported by the model. Can be true, false, or None by default, which chooses the model's default behavior based on the evaluation.
# ATTENTION: Based on evaluation, enabling native function calling may lead to worse results
# in some scenarios. Use with caution and consider testing with your specific use case.
# https://github.com/Forge/Forge/pull/4711
#native_tool_calling = None


# Safety settings for models that support them (e.g., Mistral AI, Gemini)
# Example for Mistral AI:
# safety_settings = [
#   { "category" = "hate", "threshold" = "low" },
#   { "category" = "harassment", "threshold" = "low" },
#   { "category" = "sexual", "threshold" = "low" },
#   { "category" = "dangerous", "threshold" = "low" }
# ]
#
# Example for Gemini:
# safety_settings = [
#   { "category" = "HARM_CATEGORY_HARASSMENT", "threshold" = "BLOCK_NONE" },
#   { "category" = "HARM_CATEGORY_HATE_SPEECH", "threshold" = "BLOCK_NONE" },
#   { "category" = "HARM_CATEGORY_SEXUALLY_EXPLICIT", "threshold" = "BLOCK_NONE" },
#   { "category" = "HARM_CATEGORY_DANGEROUS_CONTENT", "threshold" = "BLOCK_NONE" }
# ]
#safety_settings = []

[llm.draft_editor]
# The number of times llm_editor tries to fix an error when editing.
correct_num = 5

[llm.gpt4o-mini]
api_key = ""
model = "gpt-4o-mini"

################################ Ollama Local Models ##########################
# Forge has native Ollama support. Use the "ollama/" prefix and Forge will:
#   - Auto-detect the Ollama provider
#   - Strip the "ollama/" prefix before sending to Ollama's API
#   - Default base_url to http://localhost:11434/v1
#   - Skip API key validation (Ollama doesn't require auth)
#
# Setup:
#   1. Install Ollama from https://ollama.ai
#   2. Start Ollama: `ollama serve`
#   3. Pull a model: `ollama pull llama3.2`
#   4. Set model below (api_key and base_url are optional for Ollama)
##############################################################################

# Recommended models for coding:
# - ollama/llama3.2: Good balance of speed and quality
# - ollama/deepseek-coder: Excellent for coding tasks
# - ollama/qwen2.5-coder: Strong code completion
# - ollama/codellama: Specialized for code generation

# To use Ollama as your default model, set in [llm] section:
#   model = "ollama/llama3.2"

# Example named Ollama configuration:
#[llm.ollama]
#model = "ollama/llama3.2"
#temperature = 0.1       # Lower temp for more deterministic code
#max_output_tokens = 4000
#timeout = 120           # Increase for slower hardware

# For better code quality, use deepseek-coder:
#[llm.ollama-coder]
#model = "ollama/deepseek-coder"
#temperature = 0.0       # Very low for consistent coding
#max_output_tokens = 8000

# Custom Ollama host (non-default port or remote):
#[llm.ollama-remote]
#model = "ollama/llama3.2"
#base_url = "http://192.168.1.100:11434/v1"
#temperature = 0.1
#max_output_tokens = 2048  # Smaller context for speed

# Usage examples:
# 1. Set as default model in [llm] section:
#    model = "ollama/llama3.2"
#    base_url = "http://localhost:11434"
#
# 2. Use specific model for specific agent:
#    [agent.CodeReviewAgent]
#    llm_config = "ollama-coder"
#
# 3. Use cheaper model for condensing:
#    [condenser]
#    type = "llm"
#    llm_config = "ollama-fast"

# Performance tips for Ollama:
# - GPU: Install NVIDIA/AMD drivers for 10-100x speedup
# - RAM: Minimum 8GB, 16GB+ recommended for larger models
# - Context: Larger max_output_tokens = slower but better quality
# - Temperature: 0.0-0.2 for code, 0.5-0.8 for creative tasks

##############################################################################


#################################### Agent ###################################
# Configuration for agents (group name starts with 'agent')
# Use 'agent' for the default agent config
# otherwise, group name must be `agent.<agent_name>` (case-sensitive), e.g.
# agent.Orchestrator
##############################################################################
[agent]

# Whether the browsing tool is enabled
# Note: when this is set to true, enable_browser in the core config must also be true
enable_browsing = true

# Whether the LLM draft editor is enabled
enable_llm_editor = false

# Whether the standard editor tool (str_replace_editor) is enabled
# Only has an effect if enable_llm_editor is False
enable_editor = true


# Whether the command tool is enabled
enable_cmd = true

# Whether the think tool is enabled
enable_think = true

# Whether the finish tool is enabled
enable_finish = true

# LLM config group to use
#llm_config = 'your-llm-config-group'

# Whether to use prompt extension (e.g., playbook, repo/runtime info) at all
#enable_prompt_extensions = true

# List of playbooks to disable
#disabled_playbooks = []

# Whether history should be truncated to continue the session when hitting LLM context
# length limit
enable_history_truncation = true

# Whether the condensation request tool is enabled
enable_condensation_request = false

# Safety: Auto-pause the agent after repeated failures (5 consecutive errors,
# 3 stuck detections, 10 high-risk actions). Disable only for debugging.
enable_circuit_breaker = true

# Safety: When the iteration/budget limit is hit, give the agent one final turn
# to save work and summarize progress. Highly recommended for long sessions.
enable_graceful_shutdown = true

[agent.RepoExplorerAgent]
# Example: use a cheaper model for RepoExplorerAgent to reduce cost, especially
# useful when an agent doesn't demand high quality but uses a lot of tokens
llm_config = 'gpt3'

[agent.CustomAgent]
# Example: use a custom agent from a different package
# This will be automatically be registered as a new agent named "CustomAgent"
classpath = "my_package.my_module.MyCustomAgent"

#################################### Runtime ###################################
# Configuration for the runtime
##############################################################################
[runtime]

# Runtime timeout in seconds
#timeout = 120

# Enable auto linting after editing
#enable_auto_lint = false

# Environment variables to set at the launch of the runtime
#runtime_startup_env_vars = {}

# BrowserGym environment to use for evaluation
#browsergym_eval_env = ""

#################################### Condenser #################################
# Condensers control how conversation history is managed and compressed when
# the context grows too large. Each agent uses one condenser configuration.
##############################################################################
[condenser]
# The type of condenser to use. Available options:
# - "smart": Adaptive condensing that preserves important context (default)
# - "auto": Task-signal-based selection (picks optimal strategy per session)
# - "noop": No condensing, keeps full history (use for debugging)
# - "observation_masking": Keeps full event structure but masks older observations
# - "recent": Keeps only recent events and discards older ones
# - "llm": Uses an LLM to summarize conversation history
# - "amortized": Intelligently forgets older events while preserving important context
# - "llm_attention": Uses an LLM to prioritize most relevant context
type = "smart"

# Examples for each condenser type (uncomment and modify as needed):

# 1. NoOp Condenser - No additional settings needed
#type = "noop"

# 2. Observation Masking Condenser
#type = "observation_masking"
# Number of most-recent events where observations will not be masked
#attention_window = 100

# 3. Recent Events Condenser
#type = "recent"
# Number of initial events to always keep (typically includes task description)
#keep_first = 1
# Maximum number of events to keep in history
#max_events = 100

# 4. LLM Summarizing Condenser
#type = "llm"
# Reference to an LLM config to use for summarization
#llm_config = "condenser"
# Number of initial events to always keep (typically includes task description)
#keep_first = 1
# Maximum size of history before triggering summarization
#max_size = 100

# 5. Amortized Forgetting Condenser
#type = "amortized"
# Number of initial events to always keep (typically includes task description)
#keep_first = 1
# Maximum size of history before triggering forgetting
#max_size = 100

# 6. LLM Attention Condenser
#type = "llm_attention"
# Reference to an LLM config to use for attention scoring
#llm_config = "condenser"
# Number of initial events to always keep (typically includes task description)
#keep_first = 1
# Maximum size of history before triggering attention mechanism
#max_size = 100

# 7. Auto Condenser - Task-signal-based auto-selection
#type = "auto"
# Automatically analyses task signals (history length, error rate, browse
# frequency) and picks the best condenser strategy for the current session.
# No additional settings needed; thresholds are built-in.

# Example of a custom LLM configuration for condensers that require an LLM
# If not provided, it falls back to the default LLM
#[llm.condenser]
#model = "gpt-4o"
#temperature = 0.1
#max_input_tokens = 1024

################################## Graph RAG #################################
# Graph-based Retrieval Augmented Generation.
# Combines vector (semantic) search with structural graph traversal for
# richer, context-aware code retrieval.
##############################################################################
[graph_rag]
# Enable/disable Graph RAG.  When disabled, retrieval falls back to pure
# vector search.
#enabled = true

# Path to persist the knowledge graph between sessions.  The graph is stored
# as a JSON file containing nodes and edges.
#persistence_path = ".forge/graph.json"

# Default number of hops when expanding from seed nodes.
# 1 = direct neighbours only; 2 = neighbours-of-neighbours, etc.
#graph_depth = 1

# Maximum number of semantic (vector) hits to seed graph expansion with.
#max_seed_results = 5

#################################### Eval ####################################
# Configuration for the evaluation, please refer to the specific evaluation
# plugin for the available options
##############################################################################
