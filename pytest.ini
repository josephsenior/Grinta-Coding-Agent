[pytest]
addopts = -p no:warnings -q -m "not heavy and not integration and not benchmark" --ignore=tests/unit/utils/test_circuit_breaker.py

# Avoid recursing into duplicate nested evaluation/ directories which cause import
# file mismatch errors on Windows when pytest imports modules from two different
# paths. This ignores the nested copy created by tooling or extraction.
norecursedirs = backend/evaluation/evaluation
# Only discover tests under the top-level `tests` directory to prevent name
# collisions with duplicate test basenames in other folders (e.g., e2e vs unit)
testpaths = backend/tests
pythonpath = .
markers =
    heavy: marks tests that are heavy (install large deps / long runtime)
    integration: marks integration tests that may require docker or external services
    benchmark: marks performance/benchmark tests
    stress: marks stress tests
    asyncio: marks tests that require asyncio execution

filterwarnings =
    ignore:json_encoders is deprecated:pydantic.PydanticDeprecatedSince20
    ignore:PyPDF2 is deprecated:DeprecationWarning
    ignore:Providing `stateless_http` when creating a server is deprecated.:DeprecationWarning
    ignore:coroutine 'AsyncMockMixin._execute_mock_call' was never awaited:RuntimeWarning
