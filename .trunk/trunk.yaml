# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - checkov@3.2.526
    - actionlint@1.7.12
    - prettier@3.8.2
    - markdownlint@0.48.0
    - git-diff-check
    - trufflehog@3.94.3
  # Python lint/format/typecheck: authoritative path is pre-commit + CI
  # (.pre-commit-config.yaml, .github/workflows/lint.yml). Do not enable
  # duplicate pylint/mypy/ruff/black/isort/bandit here.
  ignore:
    - linters: [ALL]
      paths:
        - .smoke-venv/**
        - .venv/**
        - dist/**
        - build/**
        - .mypy_cache/**
        - .ruff_cache/**
        - .pytest_cache/**
