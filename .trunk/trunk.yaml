# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - prettier@3.8.2
    - markdownlint@0.48.0
    - git-diff-check
    - pylint@4.0.5
    - mypy@1.17.0
    - black@26.3.1
    - isort@8.0.1
    - bandit@1.9.4
    - trufflehog@3.94.3
    - ruff@0.12.5
  ignore:
    - linters: [ALL]
      paths:
        - .smoke-venv/**
        - .venv/**
        - dist/**
        - build/**
        - .mypy_cache/**
        - .ruff_cache/**
        - .pytest_cache/**
