# Model Catalog — Single source of truth for all LLM model metadata.
#
# Adding a new model: add a [models."model-name"] section below.
# No Python code changes needed.
#
# Fields:
#   provider           — Required. One of: openai, anthropic, google, xai, deepseek, mistral
#   aliases            — Optional. Alternative names that resolve to this model.
#   max_input_tokens   — Max input context window (tokens).
#   max_output_tokens  — Max output tokens per completion.
#   input_price_per_m  — Cost per 1M input tokens (USD).
#   output_price_per_m — Cost per 1M output tokens (USD).
#   verified           — If true, appears in CLI verified model lists.
#   featured           — If true, appears in the API model catalog.
#   supports_function_calling  — Model can use tool/function calling.
#   supports_reasoning_effort  — Model supports reasoning_effort parameter.
#   supports_prompt_cache      — Model supports Anthropic-style prompt caching.
#   supports_stop_words        — Model supports stop sequences (default: true).
#   supports_response_schema   — Model supports structured JSON schema output.
#   supports_vision            — Model supports image/vision inputs.

