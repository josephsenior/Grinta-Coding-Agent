# ============================================================================
# Forge — Docker Compose
# ============================================================================
# Quick start:   docker compose up
# With rebuild:  docker compose up --build
# Background:    docker compose up -d
# With extras:   docker compose --profile database up
# ============================================================================

services:
  forge:
    build: .
    ports:
      - "${FORGE_PORT:-3000}:3000"
    volumes:
      - ./workspace:/app/workspace          # Persist agent workspace
      - ./config.toml:/app/config.toml      # Mount your host config
      - forge_data:/home/forge/.Forge       # Persist KB and Memory
    environment:
      - FORGE_HOST=0.0.0.0
      - FORGE_PORT=3000
      - REDIS_HOST=redis
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway" # Access host providers (Ollama, etc.)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Optional: PostgreSQL for conversation/KB storage
  # Activate with: docker compose --profile database up
  postgres:
    image: postgres:16-alpine
    profiles: ["database"]
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      # WARNING: Change this password in production!
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  forge_data:
