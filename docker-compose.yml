# ============================================================================
# Forge — Docker Compose
# ============================================================================
# Quick start:   docker compose up
# With rebuild:  docker compose up --build
# Background:    docker compose up -d
# Emergency file-storage mode: FORGE_KB_STORAGE_TYPE=file docker compose up
# ============================================================================

services:
  forge:
    build: .
    ports:
      - "${FORGE_PORT:-3000}:3000"
    volumes:
      - ./workspace:/app/workspace          # Persist agent workspace
      - ./settings.json:/app/settings.json  # Mount your host config
      - forge_data:/home/forge/.Forge       # Persist KB and Memory
      - tmux_socket:/app/.tmux              # Persist tmux sockets for session continuity
    environment:
      - FORGE_HOST=0.0.0.0
      - FORGE_PORT=3000
      - KB_STORAGE_TYPE=${FORGE_KB_STORAGE_TYPE:-database}
      - DATABASE_URL=postgresql://forge:${POSTGRES_PASSWORD:-forge_dev}@postgres:5432/forge
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - TMUX_TMPDIR=/app/.tmux
      - FORGE_LLM_FIRST_CHUNK_TIMEOUT_SECONDS=60
      - FORGE_LLM_FALLBACK_TIMEOUT_SECONDS=180
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway" # Access host providers (Ollama, etc.)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Default: PostgreSQL for conversation/KB storage
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      # WARNING: Change this password in production!
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  forge_data:
  tmux_socket:
